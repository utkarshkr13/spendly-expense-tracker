const { useState, useMemo, useEffect } = React;

/* ====================== data layer (hardened) ====================== */
const LS_VERSION = 2;
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem("nivo_"+k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{
    localStorage.setItem("nivo_"+k,JSON.stringify(v));
  }catch(e){
    if(e && (e.name==="QuotaExceededError"||e.code===22)){
      console.warn("Nivo: localStorage quota exceeded for key",k,". Skipping persist.");
    }
  }},
  del:(k)=>{try{localStorage.removeItem("nivo_"+k);}catch(e){}},
};
// Version migration: wipe stale v1 data if needed
(()=>{const v=LS.get("_v",0);if(v<LS_VERSION){LS.del("txns");LS.del("confirmed");LS.set("_v",LS_VERSION);}})();

const CAT_COLOR={Food:"#ef4444",Shopping:"#8b5cf6",Transport:"#3b82f6",Rent:"#0ea5e9",Bills:"#f59e0b",
  Entertainment:"#ec4899",Health:"#14b8a6",Travel:"#22c55e",Income:"#10b981",Transfer:"#94a3b8",Other:"#64748b"};
const CATS=Object.keys(CAT_COLOR);
const DEFAULT_RULES={"zomato@hdfcbank":"Food","swiggy@ybl":"Food","blinkit@paytm":"Food","amazon@apl":"Shopping",
  "myntra@ybl":"Shopping","uber.rides@axis":"Transport","irctc@sbi":"Travel","bescom@ybl":"Bills",
  "netflix@hdfcbank":"Entertainment","apollo@ybl":"Health"};

/* ---- AI categorisation with confidence scores (step (a) of AI roadmap) ---- */
function aiCategorizeFull(merchant, vpa, rules){
  if(vpa && rules[vpa]) return {category:rules[vpa], confidence:99, method:'rule'};
  const m=(merchant||"").toLowerCase();
  const patterns=[
    [/^zomato$|^swiggy$|^dominos$|^blinkit$/,"Food",93],
    [/zomato|swiggy|dominos|cafe|restaurant|blinkit|kitchen|biryani/,"Food",80],
    [/^amazon$|^myntra$|^flipkart$|^nykaa$/,"Shopping",93],
    [/amazon|myntra|flipkart|store|mart|nykaa/,"Shopping",78],
    [/^uber$|^ola$|^rapido$/,"Transport",93],
    [/uber|ola|rapido|fuel|petrol|metro|fastag/,"Transport",78],
    [/rent|landlord|housing/,"Rent",85],
    [/electric|bescom|water|gas|recharge|airtel|jio|broadband/,"Bills",83],
    [/^netflix$|^spotify$|^hotstar$/,"Entertainment",96],
    [/netflix|spotify|bookmyshow|pvr|hotstar/,"Entertainment",81],
    [/pharma|apollo|hospital|clinic|practo|medic/,"Health",83],
    [/irctc|makemytrip|indigo|flight|hotel|airbnb/,"Travel",83],
    [/salary|interest|refund|cashback/,"Income",88],
  ];
  for(const [re,c,conf] of patterns) if(re.test(m)) return {category:c, confidence:conf, method:'pattern'};
  return {category:"Other", confidence:30, method:'fallback'};
}
function aiCategorize(merchant, vpa, rules){
  return aiCategorizeFull(merchant, vpa, rules).category;
}

const ACCOUNTS=[
  {id:"hdfc_sal",name:"HDFC Salary",bank:"HDFC",last4:"8842",role:"salary",color:"#6366f1",balance:55000},
  {id:"hdfc_spend",name:"HDFC Spends",bank:"HDFC",last4:"1190",role:"spending",color:"#10b981",balance:24628},
  {id:"icici",name:"ICICI",bank:"ICICI",last4:"5521",role:"spending",color:"#f59e0b",balance:18200},
];

  ["2026-06-02","hdfc_sal","debit",35000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],

  ["2026-06-03","hdfc_spend","debit",18000,"MAGNOLIA HOUSING RENT","","excel"],
  ["2026-06-04","hdfc_spend","debit",2650,"BLINKIT","blinkit@paytm","gmail"],
  ["2026-06-05","icici","debit",1299,"NETFLIX","netflix@hdfcbank","gmail"],
  ["2026-06-06","hdfc_spend","debit",899,"UBER","uber.rides@axis","gmail"],
  ["2026-06-07","hdfc_spend","debit",6400,"AMAZON","amazon@apl","gmail"],
  ["2026-06-08","icici","debit",1450,"BESCOM ELECTRICITY","bescom@ybl","gmail"],
  ["2026-06-09","hdfc_spend","debit",3200,"SWIGGY","swiggy@ybl","gmail"],

  ["2026-06-11","hdfc_spend","debit",5400,"MYNTRA","myntra@ybl","gmail"],
  ["2026-06-12","hdfc_sal","debit",15000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],
  ["2026-06-12","hdfc_spend","credit",15000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],

  ["2026-06-13","icici","debit",980,"DOMINOS","","gmail"],
  ["2026-06-14","hdfc_spend","debit",7300,"MAKEMYTRIP","","gmail"],
];
function seedTxns(rules){return SEED.map((r,i)=>{
  const[date,account,type,amount,merchant,vpa,source]=r;
  const isIncome=type==="credit"&&/salary|interest/i.test(merchant);
  const cat=isIncome?{category:"Income",confidence:98,method:'rule'}:aiCategorizeFull(merchant,vpa,rules);
  return{id:i+1,date,account,type,
    amount:Math.max(0,Number(amount)||0),
    merchant,vpa,source,
    category:cat.category,catConf:cat.confidence,catMethod:cat.method};
});}
const DEFAULT_BUDGETS={Food:12000,Shopping:10000,Transport:4000,Bills:5000,Entertainment:3000,Health:3000,Travel:10000};

function detectTransfers(txns){
  const matched=new Set(),pairs=[];
  const debits=txns.filter(t=>t.type==="debit"),credits=txns.filter(t=>t.type==="credit");
  for(const d of debits){if(matched.has(d.id))continue;
    for(const c of credits){if(matched.has(c.id)||c.account===d.account)continue;
      const days=Math.abs(new Date(d.date)-new Date(c.date))/864e5;
      if(d.amount===c.amount&&days<=2){matched.add(d.id);matched.add(c.id);pairs.push({from:d,to:c});break;}}}
  return{matched,pairs};
}
const INR=n=>"₹"+Math.round(n||0).toLocaleString("en-IN");
const acctName=id=>(ACCOUNTS.find(a=>a.id===id)||{}).name||id;

/* ============================ charts ============================ */
function AreaSpark({data,height=200}){
  const w=520,h=180,pad=24;
  if(!data.length)return <div className="text-sm text-slate-400">No data</div>;
  const max=Math.max(...data.map(d=>d.value))||1;
  const xs=i=>pad+(i*(w-2*pad))/Math.max(1,data.length-1);
  const ys=v=>h-pad-(v*(h-2*pad))/max;
  const line=data.map((d,i)=>`${i?"L":"M"}${xs(i)},${ys(d.value)}`).join(" ");
  const area=`${line} L${xs(data.length-1)},${h-pad} L${xs(0)},${h-pad} Z`;
  return(<svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{height}} role="img" aria-label="Daily spend chart">
    <defs><linearGradient id="ar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity="0.35"/><stop offset="100%" stopColor="#6366f1" stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill="url(#ar)"/><path d={line} fill="none" stroke="#6366f1" strokeWidth="2.5"/>
    {data.map((d,i)=>(<g key={i}><circle cx={xs(i)} cy={ys(d.value)} r="2.5" fill="#6366f1"/>
      <text x={xs(i)} y={h-6} textAnchor="middle" fontSize="9" fill="#94a3b8">{d.day}</text></g>))}
  </svg>);
}
function Donut({data}){
  const total=data.reduce((s,d)=>s+d.value,0)||1;let a=-Math.PI/2;const R=70,r=44,cx=90,cy=90;
  return(<svg viewBox="0 0 180 180" style={{height:200}} className="mx-auto" role="img" aria-label="Spending by category">
    {data.map((d,i)=>{const frac=d.value/total,a2=a+frac*2*Math.PI;
      const x1=cx+R*Math.cos(a),y1=cy+R*Math.sin(a),x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
      const xi1=cx+r*Math.cos(a2),yi1=cy+r*Math.sin(a2),xi2=cx+r*Math.cos(a),yi2=cy+r*Math.sin(a);
      const large=frac>0.5?1:0;a=a2;
      return <path key={i} d={`M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${xi1},${yi1} A${r},${r} 0 ${large} 0 ${xi2},${yi2} Z`} fill={CAT_COLOR[d.name]||CAT_COLOR.Other}/>;})}
    <text x="90" y="86" textAnchor="middle" fontSize="11" fill="#64748b">Total</text>
    <text x="90" y="104" textAnchor="middle" fontSize="14" fontWeight="600" fill="#0f172a">{INR(total)}</text>
  </svg>);
}
function Bars({data}){
  const max=Math.max(...data.map(d=>d.value),1);
  return(<div className="space-y-3">{data.map(d=>(
    <div key={d.name}><div className="flex justify-between text-xs text-slate-500 mb-1"><span>{d.name}</span><span>{INR(d.value)}</span></div>
      <div className="h-3 rounded-full bg-slate-100 overflow-hidden"><div className="h-full rounded-full" style={{width:(d.value/max*100)+"%",background:d.color||"#6366f1"}}></div></div></div>))}</div>);
}

/* ============================ shared UI ============================ */
const Logo=({size=9})=>(<div className="rounded-xl bg-gradient-to-br from-indigo-600 to-violet-600 flex items-center justify-center text-white font-bold" style={{width:size*4,height:size*4}}>N</div>);
function Card({children,className="",onClick}){
  return <div onClick={onClick} className={"rounded-2xl bg-white border border-slate-200 shadow-sm "+className}>{children}</div>;
}
function ConfBadge({conf,method}){
  if(!conf||conf>=80||method==='user')return null;
  const color=conf>=65?"text-amber-600 bg-amber-50":"text-rose-500 bg-rose-50";
  return <span className={"text-[10px] px-1.5 py-0.5 rounded-full ml-1 "+color} title={`AI confidence: ${conf}%`}>{conf}%</span>;
}

/* ============================ AUTH ============================ */
function AuthScreens({onAuthed}){
  const [mode,setMode]=useState("login");
  const [form,setForm]=useState({name:"",email:LS.get("user",{}).email||"",pass:""});
  const [code,setCode]=useState("");
  const [err,setErr]=useState("");
  const submit=()=>{
    setErr("");
    if(form.email.trim()==="@1234"&&form.pass==="@1234"){
      LS.set("user",{name:"Demo User",email:"@1234"});setMode("twofa");return;
    }
    if(mode==="signup"&&!form.name)return setErr("Enter your name");
    if(!form.email||!form.email.includes("@"))return setErr("Enter a valid email");
    if(!form.pass||form.pass.length<6)return setErr("Password must be 6+ characters");
    LS.set("user",{name:form.name||LS.get("user",{}).name||"User",email:form.email});
    setMode("twofa");
  };
  const verify=()=>{
    if(!/^\d{6}$/.test(code))return setErr("Enter the 6-digit code");
    setErr("");onAuthed();
  };
  return(<div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-100 to-indigo-50">
    <div className="w-full max-w-md">
      <div className="flex items-center justify-center gap-2 mb-6"><Logo size={11}/><span className="text-2xl font-bold tracking-tight text-slate-900">Nivo</span></div>
      <Card className="p-7 shadow-xl">
        {mode!=="twofa"?(<div>
          <h1 className="text-xl font-semibold mb-1">{mode==="login"?"Welcome back":"Create your account"}</h1>
          <p className="text-sm text-slate-500 mb-5">{mode==="login"?"Sign in to your Nivo dashboard.":"Track every rupee — clearly."}</p>
          {mode==="signup"&&<input aria-label="Full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Full name" className="w-full mb-3 px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-200 outline-none"/>}
          <input aria-label="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Email" className="w-full mb-3 px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-200 outline-none"/>
          <input aria-label="Password" type="password" value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} placeholder="Password" className="w-full mb-3 px-3 py-2.5 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-200 outline-none"/>
          {err&&<div role="alert" className="text-xs text-rose-600 mb-3">{err}</div>}
          <button onClick={submit} className="w-full py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">{mode==="login"?"Sign in":"Create account"}</button>
          <div className="mt-3 text-center text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg py-2">Demo login → ID <button type="button" onClick={()=>setForm({...form,email:"@1234",pass:"@1234"})} className="font-mono font-medium text-indigo-600">@1234</button> · Pass <span className="font-mono font-medium">@1234</span></div>
          <div className="flex items-center gap-3 my-4"><div className="h-px bg-slate-200 flex-1"></div><span className="text-xs text-slate-400">OR</span><div className="h-px bg-slate-200 flex-1"></div></div>
          <button onClick={submit} className="w-full py-2.5 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50 flex items-center justify-center gap-2"><span>🔵</span> Continue with Google</button>
          <p className="text-center text-sm text-slate-500 mt-5">{mode==="login"?"New here? ":"Already have an account? "}
            <button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");}} className="text-indigo-600 font-medium">{mode==="login"?"Create account":"Sign in"}</button></p>
        </div>):(<div>
          <div className="text-3xl mb-2">🔐</div>
          <h1 className="text-xl font-semibold mb-1">Two-factor authentication</h1>
          <p className="text-sm text-slate-500 mb-5">Enter the 6-digit code from your authenticator app to continue.</p>
          <input aria-label="6-digit 2FA code" value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="••••••" maxLength={6} className="w-full mb-3 px-3 py-3 text-center text-2xl tracking-[0.5em] rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-200 outline-none"/>
          {err&&<div role="alert" className="text-xs text-rose-600 mb-3">{err}</div>}
          <button onClick={verify} className="w-full py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700">Verify &amp; continue</button>
          <p className="text-xs text-slate-400 mt-4 text-center">Demo build: enter any 6 digits. Production verifies a TOTP (Google Authenticator / Authy) via Supabase Auth MFA.</p>
          <button onClick={()=>{setMode("login");setErr("");}} className="w-full text-center text-sm text-slate-500 mt-3">← Back</button>
        </div>)}
      </Card>
      <p className="text-center text-xs text-slate-400 mt-5">🔒 Bank-grade encryption · Read-only Gmail access · Your data stays yours</p>
    </div>
  </div>);
}

/* ============================ APP PAGES ============================ */
function Stat({label,value,sub,tone="indigo",emoji}){
  const tones={rose:"text-rose-600 bg-rose-50",emerald:"text-emerald-600 bg-emerald-50",indigo:"text-indigo-600 bg-indigo-50",slate:"text-slate-600 bg-slate-100",amber:"text-amber-600 bg-amber-50"};
  return(<Card className="p-4"><div className={"w-8 h-8 rounded-lg flex items-center justify-center mb-3 text-base "+tones[tone]}>{emoji}</div>
    <div className="text-3xl font-semibold tracking-tight">{value}</div><div className="text-sm text-slate-500 mt-0.5">{label}</div>
    {sub&&<div className="text-xs text-slate-400 mt-0.5">{sub}</div>}</Card>);
}

      <div className="flex items-start gap-3"><span className="text-lg">✨</span><div>
        <div className="text-xs uppercase tracking-wide opacity-80 mb-1">AI insight</div>

          return(<div key={cat}><div className="flex justify-between text-xs mb-1"><span className="text-slate-600">{cat}</span><span className={over?"text-rose-600 font-medium":"text-slate-400"}>{INR(used)} / {INR(limit)}</span></div>

      </Card>
      <Card className="p-5"><h3 className="font-semibold mb-3 text-sm text-slate-600">Recent transactions</h3>

  </div>);
}

function Transactions({ctx}){
  const {enriched,confirmPair,confirmed,reCat,pairs,addTxn}=ctx;
  const [query,setQuery]=useState("");const [acct,setAcct]=useState("all");const [cat,setCat]=useState("all");const [show,setShow]=useState(false);
  const [nt,setNt]=useState({date:"2026-06-14",account:"hdfc_spend",type:"debit",amount:"",merchant:"",vpa:""});
  const visible=enriched.filter(t=>{
    if(acct!=="all"&&t.account!==acct)return false;
    if(cat!=="all"&&t.category!==cat)return false;
    if(query&&!((t.merchant+" "+t.vpa+" "+t.category).toLowerCase().includes(query.toLowerCase())))return false;
    return true;});
  const pending=pairs.filter(p=>!confirmed.has(p.from.id));
  return(<div className="space-y-5">
    {pending.length>0&&<Card className="p-4 bg-amber-50 border-amber-200 shadow-none">
      <div className="text-sm font-medium text-amber-800 mb-2">🔁 {pending.length} possible internal transfer(s) — review to keep your spend accurate</div>
      <div className="space-y-2">{pending.map((p,i)=>(<div key={i} className="flex items-center justify-between bg-white rounded-lg px-3 py-2 text-sm">
        <span>{INR(p.from.amount)} · {acctName(p.from.account)} → {acctName(p.to.account)} ({p.from.date.slice(5)})</span>
        <button onClick={()=>confirmPair(p)} className="text-xs px-2.5 py-1 rounded-lg bg-emerald-600 text-white">Mark as transfer</button></div>))}</div>
    </Card>}
    <div className="flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
      <div className="flex flex-wrap items-center gap-2">
        <input aria-label="Search transactions" value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 Search…" className="px-3 py-2 text-sm rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-200"/>
        <select aria-label="Filter by account" value={acct} onChange={e=>setAcct(e.target.value)} className="text-sm rounded-lg border border-slate-200 py-2 px-3"><option value="all">All accounts</option>{ACCOUNTS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
        <select aria-label="Filter by category" value={cat} onChange={e=>setCat(e.target.value)} className="text-sm rounded-lg border border-slate-200 py-2 px-3"><option value="all">All categories</option>{CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
      </div>
      <button onClick={()=>setShow(true)} className="text-sm px-3 py-2 rounded-lg bg-indigo-600 text-white font-medium">+ Add transaction</button>
    </div>
    <Card className="overflow-hidden">
      <table className="w-full text-sm" role="table">
        <thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><tr>
          <th className="text-left font-medium px-4 py-3" scope="col">Merchant</th>
          <th className="text-left font-medium px-4 py-3 hidden md:table-cell" scope="col">Account</th>
          <th className="text-left font-medium px-4 py-3" scope="col">Category</th>
          <th className="text-right font-medium px-4 py-3" scope="col">Amount</th></tr></thead>
        <tbody>{visible.map(t=>(<tr key={t.id} className="border-t border-slate-100 hover:bg-slate-50">
          <td className="px-4 py-3"><div className="font-medium text-slate-800 flex items-center gap-2">{t.merchant}
            {t.isTransfer&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">transfer</span>}
            {t.suggestedTransfer&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">review</span>}</div>
            <div className="text-xs text-slate-400">{t.date.slice(5)} · {t.vpa||"bank"} <span className="text-[10px] px-1 rounded bg-slate-100">{t.source}</span></div></td>
          <td className="px-4 py-3 hidden md:table-cell text-slate-500">{acctName(t.account)}</td>
          <td className="px-4 py-3">
            <div className="flex items-center gap-1">
              <select aria-label={`Category for ${t.merchant}`} value={t.category} onChange={e=>reCat(t.id,e.target.value)} className="text-xs rounded-md border border-slate-200 px-1.5 py-1" style={{color:CAT_COLOR[t.category]}}>{CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
              <ConfBadge conf={t.catConf} method={t.catMethod}/>
            </div>
          </td>
          <td className={"px-4 py-3 text-right font-medium "+(t.type==="credit"?"text-emerald-600":"text-slate-800")}>{t.type==="credit"?"+":"−"}{INR(t.amount)}</td>
        </tr>))}</tbody>
      </table>
      {visible.length===0&&<div className="p-8 text-center text-sm text-slate-400">No transactions match.</div>}
    </Card>
    {show&&<div className="fixed inset-0 bg-black/30 flex items-center justify-center p-4 z-50" onClick={()=>setShow(false)} role="dialog" aria-modal="true" aria-label="Add transaction">
      <Card className="p-6 w-full max-w-md" onClick={e=>e.stopPropagation()}>
        <h3 className="font-semibold mb-4">Add transaction</h3>
        <div className="grid grid-cols-2 gap-3">
          <input aria-label="Date" type="date" value={nt.date} onChange={e=>setNt({...nt,date:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200"/>
          <select aria-label="Type" value={nt.type} onChange={e=>setNt({...nt,type:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200"><option value="debit">Debit</option><option value="credit">Credit</option></select>
          <select aria-label="Account" value={nt.account} onChange={e=>setNt({...nt,account:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200 col-span-2">{ACCOUNTS.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select>
          <input aria-label="Merchant" placeholder="Merchant" value={nt.merchant} onChange={e=>setNt({...nt,merchant:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200 col-span-2"/>
          <input aria-label="UPI ID" placeholder="UPI ID (optional)" value={nt.vpa} onChange={e=>setNt({...nt,vpa:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200"/>
          <input aria-label="Amount" placeholder="Amount" type="number" min="0" value={nt.amount} onChange={e=>setNt({...nt,amount:e.target.value})} className="px-3 py-2 text-sm rounded-lg border border-slate-200"/>
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={()=>setShow(false)} className="flex-1 py-2 rounded-lg border border-slate-200 text-sm">Cancel</button>
          <button onClick={()=>{const amt=Math.max(0,parseFloat(nt.amount)||0);if(nt.merchant&&amt>0){addTxn({...nt,amount:amt});setShow(false);setNt({...nt,merchant:"",amount:"",vpa:""});}}} className="flex-1 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium">Add</button>
        </div>
      </Card>
    </div>}
  </div>);
}

function Accounts({ctx}){
  const {enriched}=ctx;
  return(<div className="space-y-5">
    <div className="grid sm:grid-cols-3 gap-4">{ACCOUNTS.map(a=>{const spent=enriched.filter(t=>t.account===a.id&&t.type==="debit"&&!t.isTransfer&&t.category!=="Income").reduce((s,t)=>s+t.amount,0);
      return(<Card key={a.id} className="p-5">
        <div className="flex items-center justify-between mb-3"><span className="w-9 h-9 rounded-lg flex items-center justify-center text-white text-xs font-bold" style={{background:a.color}}>{a.bank[0]}</span>
          <span className="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">{a.role}</span></div>
        <div className="text-sm text-slate-500">{a.name} ••{a.last4}</div>
        <div className="text-2xl font-semibold mt-1">{INR(a.balance)}</div>
        <div className="text-xs text-slate-400 mt-2">Spent this month: {INR(spent)}</div>
      </Card>);})}      <Card className="p-5 border-dashed shadow-none flex items-center justify-center text-slate-400 text-sm cursor-pointer hover:bg-slate-50">+ Link another account</Card>
    </div>
    <Card className="p-5 bg-indigo-50 border-indigo-100 shadow-none"><div className="text-sm text-indigo-900"><strong>Why two HDFC accounts?</strong> Nivo knows your salary account funds your spends account. When you move money between them, it's flagged as an internal transfer — never counted as spending. That's why your "real spend" stays accurate even when you shuffle money around.</div></Card>
  </div>);
}

function Budgets({ctx}){
  const {byCat,budgets,setBudgets}=ctx;
  return(<div className="space-y-5">
    <Card className="p-5"><h3 className="font-semibold mb-4 text-sm text-slate-600">Monthly budgets</h3>
      <div className="space-y-4">{Object.entries(budgets).map(([cat,limit])=>{const used=byCat.find(c=>c.name===cat)?.value||0;const pct=Math.min(100,used/limit*100);const over=used>limit;
        return(<div key={cat}>
          <div className="flex justify-between items-center text-sm mb-1.5"><span className="font-medium text-slate-700 flex items-center gap-2"><span className="w-2.5 h-2.5 rounded-full" style={{background:CAT_COLOR[cat]}}></span>{cat}</span>
            <div className="flex items-center gap-2"><span className={over?"text-rose-600 text-xs":"text-slate-400 text-xs"}>{INR(used)} used</span>
              <input aria-label={`${cat} budget limit`} type="number" value={limit} onChange={e=>setBudgets({...budgets,[cat]:Math.max(0,+e.target.value||0)})} className="w-24 px-2 py-1 text-xs rounded border border-slate-200 text-right"/></div></div>
          <div className="h-2.5 rounded-full bg-slate-100 overflow-hidden"><div className="h-full rounded-full" style={{width:pct+"%",background:over?"#ef4444":CAT_COLOR[cat]}}></div></div>
          {over&&<div className="text-xs text-rose-600 mt-1">Over budget by {INR(used-limit)}</div>}
        </div>);})}</div>
    </Card>
  </div>);
}

function Insights({ctx}){
  const {byCat,byDay,enriched,totalSpend}=ctx;
  const byMerchant=useMemo(()=>{const m={};enriched.filter(t=>t.type==="debit"&&!t.isTransfer&&t.category!=="Income").forEach(t=>m[t.merchant]=(m[t.merchant]||0)+t.amount);
    return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value).slice(0,6);},[enriched]);
  const today=new Date();
  const dayOfMonth=today.getDate();
  const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const activeDays=Math.max(1,byDay.length);
  const dailyAvg=totalSpend/activeDays;
  const projectedMonthEnd=dailyAvg*daysInMonth;
  const remainingDays=daysInMonth-dayOfMonth;
  const projectedRemaining=dailyAvg*remainingDays;
  const pctElapsed=Math.round(dayOfMonth/daysInMonth*100);
  const avgDay=totalSpend/(byDay.length||1);
  return(<div className="space-y-5">
    <Card className="p-5 bg-gradient-to-r from-violet-50 to-indigo-50 border-indigo-100">
      <div className="flex items-start justify-between mb-3">
        <div><h3 className="font-semibold text-slate-800">Month-end Forecast</h3>
          <p className="text-xs text-slate-500 mt-0.5">Based on {activeDays}-day average · {INR(dailyAvg)}/day</p></div>
        <span className="text-xs px-2 py-1 rounded-full bg-indigo-100 text-indigo-700 font-medium">✨ AI</span>
      </div>
      <div className="flex items-baseline gap-2 mb-3">
        <span className="text-3xl font-bold tracking-tight text-slate-900">{INR(projectedMonthEnd)}</span>
        <span className="text-sm text-slate-500">projected by Jun {daysInMonth}</span>
      </div>
      <div className="h-2 rounded-full bg-white/70 overflow-hidden mb-2 border border-indigo-100">
        <div className="h-full rounded-full bg-indigo-500 transition-all" style={{width:pctElapsed+"%"}}></div>
      </div>
      <div className="flex justify-between text-xs text-slate-500">
        <span>Day {dayOfMonth} of {daysInMonth} — {INR(totalSpend)} spent</span>
        <span>{INR(projectedRemaining)} projected remaining</span>
      </div>
      <p className="text-xs text-slate-400 mt-2 italic">Heuristic model · Production: Supabase Edge Function with time-series smoothing</p>
    </Card>
    <div className="grid lg:grid-cols-2 gap-4">
      <Card className="p-5"><h3 className="font-semibold mb-3 text-sm text-slate-600">Top merchants</h3><Bars data={byMerchant.map(m=>({...m,color:"#6366f1"}))}/></Card>
      <Card className="p-5"><h3 className="font-semibold mb-3 text-sm text-slate-600">Category breakdown</h3><Bars data={byCat.map(c=>({...c,color:CAT_COLOR[c.name]}))}/></Card>
    </div>
    <div className="grid sm:grid-cols-3 gap-4">
      <Stat label="Avg / active day" value={INR(avgDay)} emoji="📅" tone="indigo"/>
      <Stat label="Biggest expense" value={INR(Math.max(0,...enriched.filter(t=>t.type==="debit"&&!t.isTransfer).map(t=>t.amount)))} emoji="💸" tone="rose"/>
      <Stat label="Transactions" value={enriched.filter(t=>t.type==="debit").length} emoji="🧾" tone="slate"/>
    </div>
  </div>);
}

function Settings({ctx,user,onLogout}){
  const {rules,setRules,resetData}=ctx;
  const [twofa,setTwofa]=useState(LS.get("twofa",true));
  const [gmail,setGmail]=useState(LS.get("gmail",false));
  const [newVpa,setNewVpa]=useState("");const [newCat,setNewCat]=useState("Food");
  useEffect(()=>LS.set("twofa",twofa),[twofa]);useEffect(()=>LS.set("gmail",gmail),[gmail]);
  return(<div className="space-y-5 max-w-3xl">
    <Card className="p-5"><h3 className="font-semibold mb-3">Profile</h3>
      <div className="flex items-center gap-3"><div className="w-12 h-12 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-semibold">{(user.name||"U")[0]}</div>
        <div><div className="font-medium">{user.name||"User"}</div><div className="text-sm text-slate-500">{user.email}</div></div></div>
    </Card>
    <Card className="p-5"><div className="flex items-center justify-between"><div><h3 className="font-semibold">Two-factor authentication</h3><p className="text-sm text-slate-500">Require a TOTP code at every login.</p></div>
      <button onClick={()=>setTwofa(!twofa)} aria-pressed={twofa} aria-label="Toggle two-factor authentication" className={"w-12 h-7 rounded-full transition relative "+(twofa?"bg-emerald-500":"bg-slate-300")}><span className={"absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-all "+(twofa?"left-[22px]":"left-0.5")}></span></button></div>
      {twofa&&<div className="mt-4 p-4 rounded-xl bg-slate-50 border border-slate-200 flex gap-4 items-center">
        <div className="grid grid-cols-5 gap-0.5 p-2 bg-white rounded-lg" aria-hidden="true">{Array.from({length:25}).map((_,i)=><div key={i} className="w-3 h-3" style={{background:(i*7%3===0||i%4===0)?"#0f172a":"#fff"}}></div>)}</div>
        <div className="text-sm"><div className="font-medium mb-1">Scan in Google Authenticator</div><div className="text-xs text-slate-500">Secret: <code className="bg-white px-1.5 py-0.5 rounded border">NIVO-7F2A-9X11</code></div>
        <div className="text-xs text-emerald-600 mt-1">✓ 2FA is active on your account</div></div></div>}
    </Card>
    <Card className="p-5"><div className="flex items-center justify-between"><div><h3 className="font-semibold">Gmail sync</h3><p className="text-sm text-slate-500">Read-only access to import bank alerts automatically.</p></div>
      <button onClick={()=>setGmail(!gmail)} className={"text-sm px-3 py-1.5 rounded-lg "+(gmail?"bg-slate-100 text-slate-600":"bg-indigo-600 text-white")}>{gmail?"✓ Connected":"Connect Gmail"}</button></div></Card>
    <Card className="p-5"><h3 className="font-semibold mb-1">UPI auto-tag rules</h3><p className="text-sm text-slate-500 mb-3">Tag a UPI ID once — every future payment to it is categorized automatically.</p>
      <div className="flex gap-2 mb-3">
        <input aria-label="UPI ID" value={newVpa} onChange={e=>setNewVpa(e.target.value)} placeholder="someone@bank" className="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-200"/>
        <select aria-label="Category" value={newCat} onChange={e=>setNewCat(e.target.value)} className="text-sm rounded-lg border border-slate-200 px-2">{CATS.map(c=><option key={c}>{c}</option>)}</select>
        <button onClick={()=>{if(newVpa.trim()){setRules({...rules,[newVpa.trim()]:newCat});setNewVpa("");}}} className="px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm">Add</button></div>
      <div className="flex flex-wrap gap-2">{Object.entries(rules).map(([v,c])=>(<span key={v} className="text-xs px-2 py-1 rounded-lg bg-slate-100 flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{background:CAT_COLOR[c]}}></span>{v} → {c}
        <button aria-label={`Remove rule for ${v}`} onClick={()=>{const r={...rules};delete r[v];setRules(r);}} className="text-slate-400 hover:text-rose-500">×</button></span>))}</div>
    </Card>
    <Card className="p-5"><h3 className="font-semibold mb-3">Data</h3>
      <div className="flex flex-wrap gap-2">
        <button onClick={()=>{const blob=new Blob([JSON.stringify(ctx.txns,null,2)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="nivo-export.json";a.click();URL.revokeObjectURL(u);}} className="text-sm px-3 py-2 rounded-lg border border-slate-200">⬇️ Export data</button>
        <button onClick={resetData} className="text-sm px-3 py-2 rounded-lg border border-slate-200">↺ Reset demo data</button>
        <button onClick={onLogout} className="text-sm px-3 py-2 rounded-lg border border-rose-200 text-rose-600">Log out</button></div></Card>
  </div>);
}

/* ============================ SHELL ============================ */
const NAV=[["dashboard","Dashboard","🏠"],["transactions","Transactions","🧾"],["accounts","Accounts","🏦"],["budgets","Budgets","🎯"],["insights","Insights","📊"],["settings","Settings","⚙️"]];
function Shell({onLogout}){
  const user=LS.get("user",{name:"User",email:""});
  const [page,setPage]=useState("dashboard");
  const [open,setOpen]=useState(false);
  const [rules,setRulesS]=useState(LS.get("rules",DEFAULT_RULES));
  const [txns,setTxns]=useState(()=>LS.get("txns",null)||seedTxns(LS.get("rules",DEFAULT_RULES)));
  const [confirmedArr,setConfirmedArr]=useState(LS.get("confirmed",[]));
  const [budgets,setBudgetsS]=useState(LS.get("budgets",DEFAULT_BUDGETS));
  const confirmed=useMemo(()=>new Set(confirmedArr),[confirmedArr]);
  useEffect(()=>LS.set("txns",txns),[txns]);useEffect(()=>LS.set("rules",rules),[rules]);
  useEffect(()=>LS.set("confirmed",confirmedArr),[confirmedArr]);useEffect(()=>LS.set("budgets",budgets),[budgets]);
  const setRules=r=>setRulesS(r);const setBudgets=b=>setBudgetsS(b);
  const {matched,pairs}=useMemo(()=>detectTransfers(txns),[txns]);
  const enriched=useMemo(()=>txns.map(t=>({...t,isTransfer:matched.has(t.id)&&confirmed.has(t.id),suggestedTransfer:matched.has(t.id)&&!confirmed.has(t.id)})),[txns,matched,confirmed]);
  const spendTxns=enriched.filter(t=>t.type==="debit"&&!t.isTransfer&&t.category!=="Income");
  const totalSpend=spendTxns.reduce((s,t)=>s+(t.amount||0),0);
  const naiveSpend=enriched.filter(t=>t.type==="debit").reduce((s,t)=>s+(t.amount||0),0);
  const income=enriched.filter(t=>t.category==="Income").reduce((s,t)=>s+(t.amount||0),0);
  const byCat=useMemo(()=>{const m={};spendTxns.forEach(t=>m[t.category]=(m[t.category]||0)+(t.amount||0));return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);},[enriched]);
  const byDay=useMemo(()=>{const m={};spendTxns.forEach(t=>m[t.date.slice(8)]=(m[t.date.slice(8)]||0)+(t.amount||0));return Object.entries(m).map(([day,value])=>({day,value})).sort((a,b)=>+a.day-+b.day);},[enriched]);
  const ctx={txns,enriched,totalSpend,naiveSpend,income,dedupSaved:naiveSpend-totalSpend,byCat,byDay,pairs,confirmed,budgets,setBudgets,rules,setRules,
    confirmPair:p=>setConfirmedArr([...confirmedArr,p.from.id,p.to.id]),
    reCat:(id,cat)=>setTxns(txns.map(t=>t.id===id?{...t,category:cat,catConf:100,catMethod:'user'}:t)),
    addTxn:nt=>{
      const cat=aiCategorizeFull(nt.merchant,nt.vpa,rules);
      setTxns([...txns,{id:Date.now(),...nt,source:"manual",category:cat.category,catConf:cat.confidence,catMethod:cat.method}]);
    },
    resetData:()=>{LS.del("txns");LS.del("confirmed");setTxns(seedTxns(rules));setConfirmedArr([]);}};
  const Page={dashboard:Dashboard,transactions:Transactions,accounts:Accounts,budgets:Budgets,insights:Insights}[page];
  return(<div className="min-h-screen flex">
    <aside className={"glass-nav fixed lg:static z-40 w-60 h-screen border-r flex flex-col transition-transform "+(open?"translate-x-0":"-translate-x-full lg:translate-x-0")} role="navigation" aria-label="Main navigation">
      <div className="h-16 flex items-center gap-2 px-5 border-b border-slate-200/60"><Logo/><span className="font-bold tracking-tight">Nivo</span></div>
      <nav className="flex-1 p-3 space-y-1">{NAV.map(([id,label,ic])=>(
        <button key={id} onClick={()=>{setPage(id);setOpen(false);}} aria-current={page===id?"page":undefined}
          className={"w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors "+(page===id?"bg-indigo-50 text-indigo-700 shadow-sm":"text-slate-600 hover:bg-slate-100/70")}>
          <span>{ic}</span>{label}</button>))}</nav>
      <div className="p-3 border-t border-slate-200/60"><div className="flex items-center gap-2 px-2 py-1">
        <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-sm font-semibold">{(user.name||"U")[0]}</div>
        <div className="min-w-0"><div className="text-sm font-medium truncate">{user.name}</div><div className="text-xs text-slate-400 truncate">{user.email}</div></div></div></div>
    </aside>
    {open&&<div className="fixed inset-0 bg-black/20 z-30 lg:hidden" onClick={()=>setOpen(false)} aria-hidden="true"></div>}
    <div className="flex-1 min-w-0">
      <header className="glass-nav h-16 border-b flex items-center justify-between px-5 sticky top-0 z-20">
        <div className="flex items-center gap-3">
          <button onClick={()=>setOpen(true)} className="lg:hidden text-xl p-1" aria-label="Open navigation">☰</button>
          <h1 className="font-semibold capitalize text-slate-800">{page}</h1>
        </div>
        <div className="flex items-center gap-2 text-sm text-slate-500">
          <span className="px-2.5 py-1 rounded-lg bg-slate-100/80 text-xs font-medium">June 2026</span>
        </div>
      </header>
      <main className="p-5 lg:p-7 max-w-6xl mx-auto">{page==="settings"?<Settings ctx={ctx} user={user} onLogout={onLogout}/>:<Page ctx={ctx}/>}</main>
    </div>
  </div>);
}

class ErrorBoundary extends React.Component{constructor(p){super(p);this.state={err:null};}static getDerivedStateFromError(err){return{err};}
  render(){if(this.state.err)return <div className="max-w-lg mx-auto mt-20 p-6 rounded-xl bg-rose-50 border border-rose-200 text-rose-700 text-sm"><div className="font-semibold mb-1">Render error</div><pre className="whitespace-pre-wrap">{String(this.state.err)}</pre></div>;return this.props.children;}}

function Root(){
  const [authed,setAuthed]=useState(false);
  return authed?<Shell onLogout={()=>setAuthed(false)}/>:<AuthScreens onAuthed={()=>setAuthed(true)}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>

<script defer src="/_vercel/speed-insights/script.js"></script>
