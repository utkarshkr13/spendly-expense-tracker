<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spendly — AI Expense Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}</style>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const { AreaChart, Area, PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

const ACCOUNTS = [
  { id: "hdfc_sal", name: "HDFC Salary", bank: "HDFC", last4: "8842", role: "salary", color: "#6366f1" },
  { id: "hdfc_spend", name: "HDFC Spends", bank: "HDFC", last4: "1190", role: "spending", color: "#10b981" },
  { id: "icici", name: "ICICI", bank: "ICICI", last4: "5521", role: "spending", color: "#f59e0b" },
];
const CAT_COLOR = {
  Food:"#ef4444", Shopping:"#8b5cf6", Transport:"#3b82f6", Rent:"#0ea5e9", Bills:"#f59e0b",
  Entertainment:"#ec4899", Health:"#14b8a6", Travel:"#22c55e", Income:"#10b981", Transfer:"#94a3b8", Other:"#64748b",
};
const CATS = Object.keys(CAT_COLOR);
const UPI_RULES = {
  "zomato@hdfcbank":"Food","swiggy@ybl":"Food","blinkit@paytm":"Food","amazon@apl":"Shopping",
  "myntra@ybl":"Shopping","uber.rides@axis":"Transport","irctc@sbi":"Travel","bescom@ybl":"Bills",
  "netflix@hdfcbank":"Entertainment","apollo@ybl":"Health",
};
function aiCategorize(merchant, vpa){
  if (vpa && UPI_RULES[vpa]) return UPI_RULES[vpa];
  const m=(merchant||"").toLowerCase();
  const map=[[/zomato|swiggy|dominos|cafe|restaurant|blinkit|kitchen|biryani/,"Food"],
    [/amazon|myntra|flipkart|store|mart|nykaa/,"Shopping"],[/uber|ola|rapido|fuel|petrol|metro|fastag/,"Transport"],
    [/rent|landlord|housing/,"Rent"],[/electric|bescom|water|gas|recharge|airtel|jio|broadband/,"Bills"],
    [/netflix|spotify|bookmyshow|pvr|hotstar/,"Entertainment"],[/pharma|apollo|hospital|clinic|practo|medic/,"Health"],
    [/irctc|makemytrip|indigo|flight|hotel|airbnb/,"Travel"],[/salary|interest|refund|cashback/,"Income"]];
  for (const [re,c] of map) if (re.test(m)) return c;
  return "Other";
}
const RAW=[
  ["2026-06-01","hdfc_sal","credit",90000,"ACME CORP SALARY","","gmail"],
  ["2026-06-02","hdfc_sal","debit",35000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],
  ["2026-06-02","hdfc_spend","credit",35000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],
  ["2026-06-02","hdfc_spend","debit",4200,"ZOMATO","zomato@hdfcbank","gmail"],
  ["2026-06-03","hdfc_spend","debit",18000,"MAGNOLIA HOUSING RENT","","excel"],
  ["2026-06-04","hdfc_spend","debit",2650,"BLINKIT","blinkit@paytm","gmail"],
  ["2026-06-05","icici","debit",1299,"NETFLIX","netflix@hdfcbank","gmail"],
  ["2026-06-06","hdfc_spend","debit",899,"UBER","uber.rides@axis","gmail"],
  ["2026-06-07","hdfc_spend","debit",6400,"AMAZON","amazon@apl","gmail"],
  ["2026-06-08","icici","debit",1450,"BESCOM ELECTRICITY","bescom@ybl","gmail"],
  ["2026-06-09","hdfc_spend","debit",3200,"SWIGGY","swiggy@ybl","gmail"],
  ["2026-06-10","hdfc_spend","debit",2100,"APOLLO PHARMACY","apollo@ybl","gmail"],
  ["2026-06-11","hdfc_spend","debit",5400,"MYNTRA","myntra@ybl","gmail"],
  ["2026-06-12","hdfc_sal","debit",15000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],
  ["2026-06-12","hdfc_spend","credit",15000,"UPI/SELF/UTKARSH","utkarsh@oksbi","gmail"],
  ["2026-06-13","hdfc_spend","debit",1750,"IRCTC","irctc@sbi","gmail"],
  ["2026-06-13","icici","debit",980,"DOMINOS","","gmail"],
  ["2026-06-14","hdfc_spend","debit",7300,"MAKEMYTRIP","","gmail"],
].map((r,i)=>{const[date,account,type,amount,merchant,vpa,source]=r;
  return{id:i+1,date,account,type,amount,merchant,vpa,source,
    category:type==="credit"&&/salary|interest/i.test(merchant)?"Income":aiCategorize(merchant,vpa)};});

function detectTransfers(txns){
  const matched=new Set(),pairs=[];
  const debits=txns.filter(t=>t.type==="debit"),credits=txns.filter(t=>t.type==="credit");
  for(const d of debits){ if(matched.has(d.id))continue;
    for(const c of credits){ if(matched.has(c.id)||c.account===d.account)continue;
      const days=Math.abs(new Date(d.date)-new Date(c.date))/864e5;
      if(d.amount===c.amount&&days<=2){matched.add(d.id);matched.add(c.id);pairs.push({from:d,to:c});break;}}}
  return {matched,pairs};
}
const INR=n=>"₹"+n.toLocaleString("en-IN");
const acctName=id=>(ACCOUNTS.find(a=>a.id===id)||{}).name||id;

function Kpi({label,value,sub,tone,emoji}){
  const tones={rose:"text-rose-600 bg-rose-50",emerald:"text-emerald-600 bg-emerald-50",indigo:"text-indigo-600 bg-indigo-50",slate:"text-slate-600 bg-slate-100"};
  return (<div className="rounded-2xl bg-white border border-slate-200 p-4">
    <div className={"w-8 h-8 rounded-lg flex items-center justify-center mb-3 text-base "+tones[tone]}>{emoji}</div>
    <div className="text-2xl font-semibold tracking-tight">{value}</div>
    <div className="text-sm text-slate-500">{label}</div>
    <div className="text-xs text-slate-400 mt-0.5">{sub}</div></div>);
}

function App(){
  const [txns,setTxns]=useState(RAW);
  const [connected,setConnected]=useState(false);
  const [mfa,setMfa]=useState(false);
  const [query,setQuery]=useState("");
  const [acctFilter,setAcctFilter]=useState("all");
  const [confirmed,setConfirmed]=useState(()=>new Set());
  const {matched,pairs}=useMemo(()=>detectTransfers(txns),[txns]);
  const enriched=useMemo(()=>txns.map(t=>({...t,isTransfer:matched.has(t.id)&&confirmed.has(t.id),suggestedTransfer:matched.has(t.id)&&!confirmed.has(t.id)})),[txns,matched,confirmed]);
  const visible=enriched.filter(t=>{
    if(acctFilter!=="all"&&t.account!==acctFilter)return false;
    if(query&&!((t.merchant+" "+t.vpa+" "+t.category).toLowerCase().includes(query.toLowerCase())))return false;
    return true;});
  const spendTxns=enriched.filter(t=>t.type==="debit"&&!t.isTransfer&&t.category!=="Income");
  const totalSpend=spendTxns.reduce((s,t)=>s+t.amount,0);
  const naiveSpend=enriched.filter(t=>t.type==="debit").reduce((s,t)=>s+t.amount,0);
  const income=enriched.filter(t=>t.category==="Income").reduce((s,t)=>s+t.amount,0);
  const dedupSaved=naiveSpend-totalSpend;
  const byCat=useMemo(()=>{const m={};spendTxns.forEach(t=>m[t.category]=(m[t.category]||0)+t.amount);
    return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);},[spendTxns]);
  const byDay=useMemo(()=>{const m={};spendTxns.forEach(t=>m[t.date.slice(8)]=(m[t.date.slice(8)]||0)+t.amount);
    return Object.entries(m).map(([day,value])=>({day,value})).sort((a,b)=>+a.day-+b.day);},[spendTxns]);
  const byAccount=useMemo(()=>ACCOUNTS.map(a=>({name:a.name,value:spendTxns.filter(t=>t.account===a.id).reduce((s,t)=>s+t.amount,0),color:a.color})),[spendTxns]);
  const confirmPair=p=>setConfirmed(s=>new Set([...s,p.from.id,p.to.id]));
  const reCat=(id,cat)=>setTxns(ts=>ts.map(t=>t.id===id?{...t,category:cat}:t));
  const topCat=byCat[0];
  const aiInsight=topCat?`You've spent ${INR(topCat.value)} on ${topCat.name} this month — ${Math.round(topCat.value/totalSpend*100)}% of real spend. ${pairs.length} internal transfer${pairs.length!==1?"s":""} totalling ${INR(dedupSaved)} ${pairs.length?"were":"was"} excluded so your spend isn't double-counted.`:"Connect Gmail to start tracking.";

  return (<div className="min-h-screen text-slate-900">
    <header className="sticky top-0 z-20 bg-white/80 backdrop-blur border-b border-slate-200">
      <div className="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white text-lg">👛</div>
          <span className="text-lg font-semibold tracking-tight">Spendly</span>
          <span className="ml-2 text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">June 2026</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={()=>setMfa(v=>!v)} className={"flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-lg border "+(mfa?"border-emerald-200 bg-emerald-50 text-emerald-700":"border-slate-200 text-slate-600")}>🛡️ {mfa?"2FA on":"Enable 2FA"}</button>
          <button onClick={()=>setConnected(v=>!v)} className={"flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-lg "+(connected?"bg-slate-100 text-slate-600":"bg-indigo-600 text-white")}>{connected?"🔄 Sync Gmail":"✉️ Connect Gmail"}</button>
        </div>
      </div>
    </header>
    <main className="max-w-6xl mx-auto px-5 py-7 space-y-6">
      <div className="rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 text-white p-6 shadow-sm">
        <div className="flex items-start gap-3"><span className="text-lg">✨</span>
          <div><div className="text-xs uppercase tracking-wide opacity-80 mb-1">AI insight</div>
            <p className="text-[15px] leading-relaxed">{aiInsight}</p></div></div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <Kpi label="Real spend" value={INR(totalSpend)} sub="transfers excluded" emoji="📉" tone="rose"/>
        <Kpi label="Income" value={INR(income)} sub="salary credited" emoji="📈" tone="emerald"/>
        <Kpi label="Net saved" value={INR(income-totalSpend)} sub="income − spend" emoji="👛" tone="indigo"/>
        <Kpi label="Double-count avoided" value={INR(dedupSaved)} sub={pairs.length+" transfers netted"} emoji="🔁" tone="slate"/>
      </div>
      <div className="rounded-2xl bg-white border border-slate-200 p-5">
        <div className="flex items-center gap-2 mb-1"><span>🔁</span><h3 className="font-semibold">Smart transfer netting</h3></div>
        <p className="text-sm text-slate-500 mb-3">A naive tracker would show <span className="font-medium text-slate-700">{INR(naiveSpend)}</span> spent. We detected self-transfers between your own accounts and show the true figure: <span className="font-medium text-emerald-600">{INR(totalSpend)}</span>.</p>
        {pairs.filter(p=>!confirmed.has(p.from.id)).length===0?
          <div className="text-sm text-emerald-600">✓ All transfers reviewed.</div>:
          <div className="space-y-2">{pairs.filter(p=>!confirmed.has(p.from.id)).map((p,i)=>(
            <div key={i} className="flex items-center justify-between bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5">
              <div className="text-sm"><span className="font-medium">{INR(p.from.amount)}</span> <span className="text-slate-500">{acctName(p.from.account)} → {acctName(p.to.account)} on {p.from.date.slice(5)}</span>
                <span className="ml-2 text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700">likely internal transfer</span></div>
              <button onClick={()=>confirmPair(p)} className="text-xs px-2.5 py-1 rounded-lg bg-emerald-600 text-white">✓ It's a transfer</button>
            </div>))}</div>}
      </div>
      <div className="grid md:grid-cols-3 gap-4">
        <div className="rounded-2xl bg-white border border-slate-200 p-5 md:col-span-2">
          <h3 className="font-semibold mb-3 text-sm text-slate-600">Daily spend</h3>
          <ResponsiveContainer width="100%" height={220}>
            <AreaChart data={byDay} margin={{left:-18,right:8}}>
              <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" stopOpacity={0.35}/><stop offset="100%" stopColor="#6366f1" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="day" tick={{fontSize:11}} stroke="#94a3b8"/>
              <YAxis tick={{fontSize:11}} stroke="#94a3b8" tickFormatter={v=>v/1000+"k"}/>
              <Tooltip formatter={v=>INR(v)}/>
              <Area type="monotone" dataKey="value" stroke="#6366f1" strokeWidth={2} fill="url(#g)"/>
            </AreaChart></ResponsiveContainer>
        </div>
        <div className="rounded-2xl bg-white border border-slate-200 p-5">
          <h3 className="font-semibold mb-3 text-sm text-slate-600">By category</h3>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={byCat} dataKey="value" nameKey="name" innerRadius={48} outerRadius={78} paddingAngle={2}>
              {byCat.map(c=><Cell key={c.name} fill={CAT_COLOR[c.name]||CAT_COLOR.Other}/>)}</Pie>
              <Tooltip formatter={v=>INR(v)}/></PieChart></ResponsiveContainer>
          <div className="flex flex-wrap gap-1.5 mt-1">{byCat.slice(0,5).map(c=>(
            <span key={c.name} className="text-xs flex items-center gap-1 text-slate-500"><span className="w-2 h-2 rounded-full" style={{background:CAT_COLOR[c.name]||CAT_COLOR.Other}}></span>{c.name}</span>))}</div>
        </div>
      </div>
      <div className="rounded-2xl bg-white border border-slate-200 p-5">
        <h3 className="font-semibold mb-3 text-sm text-slate-600">Spend by account</h3>
        <ResponsiveContainer width="100%" height={150}>
          <BarChart data={byAccount} layout="vertical" margin={{left:40,right:16}}>
            <XAxis type="number" hide/><YAxis type="category" dataKey="name" tick={{fontSize:12}} stroke="#64748b" width={90}/>
            <Tooltip formatter={v=>INR(v)}/><Bar dataKey="value" radius={[0,6,6,0]}>{byAccount.map(a=><Cell key={a.name} fill={a.color}/>)}</Bar>
          </BarChart></ResponsiveContainer>
      </div>
      <div className="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center justify-between">
        <div className="flex items-center gap-2 flex-1">
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 Search merchant, UPI, category…" className="flex-1 max-w-sm px-3 py-2 text-sm rounded-lg border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-200"/>
          <select value={acctFilter} onChange={e=>setAcctFilter(e.target.value)} className="text-sm rounded-lg border border-slate-200 bg-white py-2 px-3">
            <option value="all">All accounts</option>{ACCOUNTS.map(a=><option key={a.id} value={a.id}>{a.name} ••{a.last4}</option>)}</select>
        </div>
        <label className="flex items-center gap-1.5 text-sm px-3 py-2 rounded-lg border border-slate-200 bg-white cursor-pointer hover:bg-slate-50">⬆️ Import Excel<input type="file" className="hidden" accept=".xlsx,.csv"/></label>
      </div>
      <div className="rounded-2xl bg-white border border-slate-200 overflow-hidden">
        <table className="w-full text-sm"><thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
          <tr><th className="text-left font-medium px-4 py-3">Merchant</th><th className="text-left font-medium px-4 py-3 hidden sm:table-cell">Account</th>
            <th className="text-left font-medium px-4 py-3">Category</th><th className="text-right font-medium px-4 py-3">Amount</th></tr></thead>
          <tbody>{visible.map(t=>(
            <tr key={t.id} className="border-t border-slate-100 hover:bg-slate-50">
              <td className="px-4 py-3"><div className="font-medium text-slate-800 flex items-center gap-2">{t.merchant}
                {t.isTransfer&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">transfer</span>}
                {t.suggestedTransfer&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-amber-100 text-amber-700">review</span>}</div>
                <div className="text-xs text-slate-400 flex items-center gap-1.5">{t.date.slice(5)} · {t.vpa||"bank"}<span className="text-[10px] px-1 rounded bg-slate-100">{t.source}</span></div></td>
              <td className="px-4 py-3 hidden sm:table-cell text-slate-500">{acctName(t.account)}</td>
              <td className="px-4 py-3"><select value={t.category} onChange={e=>reCat(t.id,e.target.value)} className="text-xs rounded-md border border-slate-200 px-1.5 py-1 bg-white" style={{color:CAT_COLOR[t.category]||CAT_COLOR.Other}}>{CATS.map(c=><option key={c} value={c}>{c}</option>)}</select></td>
              <td className={"px-4 py-3 text-right font-medium "+(t.type==="credit"?"text-emerald-600":"text-slate-800")}>{t.type==="credit"?"+":"−"}{INR(t.amount)}</td>
            </tr>))}</tbody></table>
      </div>
      <p className="text-center text-xs text-slate-400 pb-6">Prototype · mock data emulating Gmail bank-alert parsing · categorize a UPI ID once and the rule applies to all future payments from it.</p>
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
